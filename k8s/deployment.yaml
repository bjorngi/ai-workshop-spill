apiVersion: apps/v1
kind: Deployment
metadata:
  name: plasseringsspillet
  namespace: plasseringsspillet
  labels:
    app: plasseringsspillet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plasseringsspillet
  template:
    metadata:
      labels:
        app: plasseringsspillet
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: plasseringsspillet
        image: ghcr.io/bjorngi/ai-workshop-spill:20260617125334-96d9d92 # {"$imagepolicy": "flux-system:plasseringsspillet"}
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
