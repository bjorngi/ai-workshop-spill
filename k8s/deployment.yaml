apiVersion: apps/v1
kind: Deployment
metadata:
  name: plasseringsspillet
  namespace: plasseringsspillet
  labels:
    app: plasseringsspillet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plasseringsspillet
  template:
    metadata:
      labels:
        app: plasseringsspillet
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      # SSR Node server (react-router-serve). In-memory WebRTC signaling + the
      # host-relay topology mean state lives in this single process, so we keep
      # replicas: 1 — no horizontal scaling without sticky sessions / shared store.
      - name: plasseringsspillet
        image: ghcr.io/bjorngi/ai-workshop-spill:20260617130701-ad380d1 # {"$imagepolicy": "flux-system:plasseringsspillet"}
        imagePullPolicy: IfNotPresent
        env:
        - name: PORT
          value: "8080"
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 384Mi
