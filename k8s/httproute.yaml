# Routes https://plasseringsspillet.stackunderflow.no to the plasseringsspillet Service.
#
# Attaches ONLY to the plasseringsspillet-https listener (port 443). The port-80
# http listener is handled by the global http-to-https HTTPRoute in
# infrastructure/configs/http-redirect.yaml, so all cleartext requests are
# 301-redirected to HTTPS. We pin sectionName here; without it the route would
# also attach to the port-80 listener, and because plasseringsspillet.stackunderflow.no
# is more specific than *.stackunderflow.no it would win and defeat the redirect.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plasseringsspillet
  namespace: plasseringsspillet
spec:
  parentRefs:
  - name: external
    namespace: gateway
    sectionName: plasseringsspillet-https
  hostnames:
  - plasseringsspillet.stackunderflow.no
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: plasseringsspillet
      port: 80
